name: E2E Tests

# Playwright suite for NationsData. Runs against production by default; override
# the target with a repository variable `BASE_URL` (Settings → Variables) to point
# at a preview/staging deployment.
#
# Manual runs (Actions → E2E Tests → Run workflow) let you pick which suite to run:
#   - smoke      → @smoke          (fast P0 journeys — the default everywhere)
#   - regression → @regression     (full P1 + P2 functional suites)
#   - all        → entire suite    (smoke + regression, no grep filter)
#
# Automatic triggers (push to main, PRs, nightly) always run the smoke suite.
# Publishes an Allure report (with history/trends) to GitHub Pages on main/nightly;
# PRs get the report as a downloadable artifact.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Which test suite to run'
        type: choice
        default: smoke
        options:
          - smoke
          - regression
          - all
  schedule:
    - cron: '0 6 * * *' # nightly at 06:00 UTC

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: nations-data-e2e

# Chosen suite for this run. Manual runs use the dropdown; every other trigger
# (push / PR / nightly) falls back to the fast smoke suite.
env:
  SUITE: ${{ github.event.inputs.suite || 'smoke' }}

jobs:
  # Fast gate on every push / PR: desktop (Chromium) + phone (Mobile/WebKit).
  # The mobile project runs on the WebKit engine, so it installs `webkit`.
  test:
    name: ${{ github.event.inputs.suite || 'smoke' }} (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { project: chromium, browser: chromium }
          - { project: mobile, browser: webkit }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: nations-data-e2e/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run ${{ env.SUITE }} tests
        run: |
          case "$SUITE" in
            smoke)      FILTER=(--grep @smoke) ;;
            regression) FILTER=(--grep @regression) ;;
            all)        FILTER=() ;;
            *) echo "::error::Unknown suite '$SUITE' (expected smoke|regression|all)"; exit 1 ;;
          esac
          npx playwright test "${FILTER[@]}" --project=${{ matrix.project }}
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.thenationsdata.com' }}
      - name: Upload Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.project }}
          path: nations-data-e2e/allure-results
          retention-days: 7

  # Broader coverage — Firefox + WebKit — nightly and on demand only.
  cross-browser:
    name: ${{ github.event.inputs.suite || 'smoke' }} (${{ matrix.browser }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: nations-data-e2e/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run ${{ env.SUITE }} tests
        run: |
          case "$SUITE" in
            smoke)      FILTER=(--grep @smoke) ;;
            regression) FILTER=(--grep @regression) ;;
            all)        FILTER=() ;;
            *) echo "::error::Unknown suite '$SUITE' (expected smoke|regression|all)"; exit 1 ;;
          esac
          npx playwright test "${FILTER[@]}" --project=${{ matrix.browser }}
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.thenationsdata.com' }}
      - name: Upload Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: nations-data-e2e/allure-results
          retention-days: 7

  # Aggregate every job's results into one Allure report with history/trends.
  report:
    name: Allure report
    needs: [test, cross-browser]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: nations-data-e2e/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: nations-data-e2e/allure-results
          merge-multiple: true

      - name: Restore history from gh-pages (if any)
        run: |
          if git clone --single-branch --branch gh-pages --depth 1 \
               "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
               "$GITHUB_WORKSPACE/gh-pages-prev" 2>/dev/null; then
            [ -d "$GITHUB_WORKSPACE/gh-pages-prev/history" ] \
              && cp -r "$GITHUB_WORKSPACE/gh-pages-prev/history" allure-results/history || true
            echo "Restored previous Allure history for trends."
          else
            echo "No gh-pages branch yet — starting fresh history."
          fi

      - name: Generate Allure report
        run: npm run allure:generate

      - name: Upload Allure report artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: nations-data-e2e/allure-report
          retention-days: 30

      - name: Publish report to GitHub Pages
        if: ${{ github.event_name != 'pull_request' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: nations-data-e2e/allure-report
