name: E2E Smoke

# Smoke suite for NationsData. Runs against production by default; override the
# target with a repository variable `BASE_URL` (Settings → Variables) to point at
# a preview/staging deployment. Publishes an Allure report (with history/trends)
# to GitHub Pages on main/nightly; PRs get the report as a downloadable artifact.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # nightly at 06:00 UTC

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: nations-data-e2e

jobs:
  # Fast gate on every push / PR: desktop (Chromium) + phone (Mobile/WebKit).
  # The mobile project runs on the WebKit engine, so it installs `webkit`.
  smoke:
    name: Smoke (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { project: chromium, browser: chromium }
          - { project: mobile, browser: webkit }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: nations-data-e2e/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run smoke tests
        run: npx playwright test --grep @smoke --project=${{ matrix.project }}
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.thenationsdata.com' }}
      - name: Upload Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.project }}
          path: nations-data-e2e/allure-results
          retention-days: 7

  # Broader coverage — Firefox + WebKit — nightly and on demand only.
  cross-browser:
    name: Smoke (${{ matrix.browser }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: nations-data-e2e/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run smoke tests
        run: npx playwright test --grep @smoke --project=${{ matrix.browser }}
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.thenationsdata.com' }}
      - name: Upload Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: nations-data-e2e/allure-results
          retention-days: 7

  # Aggregate every job's results into one Allure report with history/trends.
  report:
    name: Allure report
    needs: [smoke, cross-browser]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: nations-data-e2e/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: nations-data-e2e/allure-results
          merge-multiple: true

      - name: Fetch previous report (for history/trends)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-prev

      - name: Restore history
        run: |
          if [ -d "$GITHUB_WORKSPACE/gh-pages-prev/history" ]; then
            cp -r "$GITHUB_WORKSPACE/gh-pages-prev/history" allure-results/history
          fi

      - name: Generate Allure report
        run: npm run allure:generate

      - name: Upload Allure report artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: nations-data-e2e/allure-report
          retention-days: 30

      - name: Publish report to GitHub Pages
        if: ${{ github.event_name != 'pull_request' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: nations-data-e2e/allure-report
